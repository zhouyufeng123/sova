<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="联系我们，获取沙发询价，并查看老挝实体店位置。">
    <title data-zh="联系我们 - 舒适家居" data-lo="ຕິດຕໍ່ພວກເຮົາ - ເຮືອນທີ່ສະດວກ">联系我们 - 舒适家居</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="navbar-logo-link" >
                <img src="./image/logo.png" alt="舒适家居Logo" class="logo-img">
            </a>
            <button class="menu-toggle" id="menuToggle">☰</button>
            <ul class="navbar-menu" id="navbarMenu">
                <li><a href="index.html" data-zh="首页" data-lo="ໜ້າຫຼັກ">首页</a></li>
                <li><a href="products.html" data-zh="产品展示" data-lo="ສະແດງຜະລິດຕະພັນ">产品展示</a></li>
                <li><a href="about.html" data-zh="关于我们" data-lo="ກ່ຽວກັບພວກເຮົາ">关于我们</a></li>
                <li><a href="contact.html" data-zh="联系我们" data-lo="ຕິດຕໍ່ພວກເຮົາ">联系我们</a></li>
                <li><button class="language-switcher" id="langSwitcher" onclick="toggleLanguage()">ລາວ</button></li>
            </ul>
        </div>
    </nav>

    <section class="section">
        <div class="container">
            <h1 class="text-center" data-zh="联系我们 | 预约到店体验" data-lo="ຕິດຕໍ່ພວກເຮົາ | ນັດໝາຍມາຮ້ານ">联系我们 | 预约到店体验</h1>
            <p class="text-center mb-3" data-zh="我们专业的销售团队将为您提供贴心的服务，解答所有疑问。" data-lo="ທີມງານຂາຍມືອາຊີບຂອງພວກເຮົາຈະໃຫ້ບໍລິການທີ່ອົບອຸ່ນແລະຕອບທຸກຄໍາຖາມຂອງທ່ານ.">我们专业的销售团队将为您提供贴心的服务，解答所有疑问。</p>
            
            <div style="display: flex; gap: 50px; flex-wrap: wrap;">
                <div style="flex: 1; min-width: 300px;">
                    <h2 class="mb-2" data-zh="快速询价/联系表单" data-lo="ແບບຟອມສອບຖາມ/ຕິດຕໍ່ດ່ວນ">快速询价/联系表单</h2>
                    <form class="contact-form" onsubmit="alert('表单已提交！我们将尽快联系您。 (老挝语: ຟອມໄດ້ຖືກສົ່ງແລ້ວ! ພວກເຮົາຈະຕິດຕໍ່ທ່ານໄວທີ່ສຸດ)'); return false;">
                        <div class="form-group">
                            <label for="name" data-zh="您的姓名" data-lo="ຊື່ຂອງທ່ານ">您的姓名</label>
                            <input type="text" id="name" name="name" required placeholder="例如：Mr. Bounchan">
                        </div>
                        <div class="form-group">
                            <label for="phone" data-zh="电话号码" data-lo="ເບີໂທລະສັບ">电话号码</label>
                            <input type="tel" id="phone" name="phone" required placeholder="+856 20 XXXX XXXX">
                        </div>
                        <div class="form-group">
                            <label for="interest" data-zh="意向沙发款式/材质" data-lo="ລາຍການໂຊຟາທີ່ທ່ານສົນໃຈ">意向沙发款式/材质</label>
                            <select id="interest" name="interest">
                                <option value="" data-zh="请选择" data-lo="ກະລຸນາເລືອກ">请选择</option>
                                <option value="三人座" data-zh="经典三人座沙发" data-lo="ໂຊຟາ 3 ທີ່ນັ່ງຄລາສສິກ">经典三人座沙发</option>
                                <option value="L型" data-zh="L型转角沙发" data-lo="ໂຊຟາມຸມ L">L型转角沙发</option>
                                <option value="单人" data-zh="单人/双人沙发" data-lo="ໂຊຟາຄູ່/ດ່ຽວ">单人/双人沙发</option>
                                <option value="皮质" data-zh="真皮系列" data-lo="ຊຸດໜັງແທ້">真皮系列</option>
                                <option value="布艺" data-zh="布艺系列" data-lo="ຊຸດຜ້າ">布艺系列</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="message" data-zh="您的留言/疑问" data-lo="ຂໍ້ຄວາມ/ຄຳຖາມຂອງທ່ານ">您的留言/疑问</label>
                            <textarea id="message" name="message" placeholder="例如：我想在周六下午到店试坐..."></textarea>
                        </div>
                        <input type="submit" class="btn btn-primary mt-1" data-zh="提交表单" data-lo="ສົ່ງຟອມ" value="提交表单">
                    </form>
                </div>

                <div style="flex: 1; min-width: 300px;">
                    <h2 class="mb-2" data-zh="我们的实体店位置" data-lo="ທີ່ຕັ້ງຂອງຮ້ານພວກເຮົາ">我们的实体店位置</h2>
                    <p class="mb-1" data-zh="📍 地址：老挝万象市 Chanthabouly 区 XXX 路" data-lo="📍 ທີ່ຢູ່: ຖະໜົນ XXX, ເມືອງ ຈັນທະບູລີ, ນະຄອນຫຼວງວຽງຈັນ, ລາວ">📍 地址：老挝万象市 Chanthabouly 区 XXX 路</p>
                    <p class="mb-1" data-zh="📞 电话：+856 20 1234 5678" data-lo="📞 ໂທລະສັບ: +856 20 1234 5678">📞 电话：+856 20 1234 5678</p>
                    <p class="mb-1" data-zh="🕒 营业时间：周一至周日 9:00-18:00" data-lo="🕒 ເວລາເປີດເຮັດການ: ຈັນ-ອາທິດ 9:00-18:00">🕒 营业时间：周一至周日 9:00-18:00</p>
                    
                    <div class="map-container">
                        <iframe src="https://maps.google.com/maps?q=Vientiane+Laos+Sofa+Store&t=&z=13&ie=UTF8&iwloc=&output=embed" frameborder="0" scrolling="no" marginheight="0" marginwidth="0" style="width: 100%; height: 100%;"></iframe>
                    </div>
                    <p class="mt-1" data-zh="点击地图查看导航路线" data-lo="ຄລິກໃສ່ແຜນທີ່ເພື່ອກວດເບິ່ງເສັ້ນທາງນໍາທາງ">点击地图查看导航路线</p>
                </div>
            </div>
            
        </div>
    </section>

    <footer class="footer">
        </footer>

    <script src="script.js"></script>
</body>
</html>
